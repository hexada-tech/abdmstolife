<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // Replace with your project details from Project Settings -> API
    const supabase = supabase.createClient('https://utiaihpnzdxtzalejwru.supabase.co', 'sb_publishable_pWFIoQMBIv48cZdHFah8nA_WwgfB0SR');

    async function loadPosts() {
        const { data: posts, error } = await supabase.from('posts').select('*');
        if (error) {
            console.error('Error:', error);
            return;
        }

        const container = document.getElementById('blog-container');
        container.innerHTML = ''; 

        posts.forEach(post => {
            const formattedContent = marked.parse(post.content);
            container.innerHTML += `
                <div class="post-card">
                    <h2>${post.title}</h2>
                    <div class="post-content">${formattedContent}</div>
                </div>
            `;
        });
    }
    loadPosts();
</script>
