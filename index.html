<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Free GitHub Site</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --primary-color: #3b82f6;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --menu-bg: #ffffff;
            --menu-hover: #f1f5f9;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            padding: 50px; 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }
        h1 { color: var(--text-main); font-size: 2.5rem; margin-top: 5vh; }
        p.subtitle { color: var(--text-muted); font-size: 1.2rem; }

        /* Blog Post Container */
        #blog-container {
            max-width: 700px;
            margin: 40px auto;
            text-align: left;
        }
        
        /* Post Card Base */
        .post-card {
            background: #ffffff;
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }
        .post-card:hover { transform: translateY(-3px); }
        .post-card h2 { margin-top: 0; color: var(--primary-color); margin-bottom: 5px; font-size: 1.8rem; }
        .post-card small { color: #94a3b8; font-weight: 600; display: block; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #e2e8f0; }

        /* ---- RICH TEXT FORMATTING STYLES ---- */
        .post-content { color: var(--text-main); font-size: 1.05rem; line-height: 1.7; }
        .post-content h3 { color: #0f172a; margin-top: 25px; }
        .post-content p { margin-bottom: 15px; }
        .post-content ul { padding-left: 20px; margin-bottom: 15px; }
        .post-content li { margin-bottom: 8px; }
        .post-content blockquote { border-left: 4px solid var(--primary-color); background: #f1f5f9; padding: 15px; margin: 15px 0; border-radius: 0 8px 8px 0; font-style: italic; }
        .post-content code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #ef4444; }
        
        /* Normal Links inside text */
        .post-content a { color: var(--primary-color); text-decoration: none; font-weight: 600; }
        .post-content a:hover { text-decoration: underline; }

        /* THE MAGIC PRO UI BUTTON (Links on their own line) */
        .post-content p > a:only-child {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            transition: all 0.3s ease;
            margin: 15px 0;
            width: fit-content;
        }
        .post-content p > a:only-child:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.5);
            text-decoration: none;
        }
        .post-content p > a:only-child::after {
            content: '\f08e'; /* FontAwesome External Link Icon */
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            margin-left: 10px;
        }
        /* ------------------------------------- */

        /* Floating Menu & Sidebar (Same as before) */
        .menu-btn { position: fixed; top: 25px; right: 25px; background-color: var(--menu-bg); border: none; border-radius: 50%; width: 55px; height: 55px; font-size: 22px; color: var(--text-main); cursor: pointer; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); transition: all 0.3s ease; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .menu-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(3px); opacity: 0; visibility: hidden; transition: 0.4s ease; z-index: 998; }
        .overlay.active { opacity: 1; visibility: visible; }
        .sidebar { position: fixed; top: 0; right: -350px; width: 300px; height: 100vh; background: var(--menu-bg); box-shadow: -5px 0 25px rgba(0,0,0,0.1); transition: right 0.4s ease; z-index: 999; padding-top: 100px; text-align: left; display: flex; flex-direction: column; }
        .sidebar.active { right: 0; }
        .menu-item { padding: 18px 30px; font-size: 1.1rem; font-weight: 600; cursor: pointer; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .menu-item:hover { background: var(--menu-hover); }
        .submenu { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; background: #f8fafc; }
        .submenu.active { max-height: 400px; }
        .submenu a { display: flex; align-items: center; padding: 15px 30px 15px 50px; text-decoration: none; color: var(--text-muted); font-size: 1rem; font-weight: 500; transition: all 0.3s ease; }
        .submenu a i { margin-right: 15px; font-size: 1.3rem; width: 25px; text-align: center; }
        .submenu a:hover { background: #e2e8f0; color: var(--text-main); padding-left: 55px; }
        .submenu a:hover .fa-facebook { color: #1877F2; }
        .submenu a:hover .fa-telegram { color: #229ED9; }
        .submenu a:hover .fa-youtube { color: #FF0000; }
        .submenu a:hover .fa-discord { color: #5865F2; }

        /* ---- NEW: REDIRECT MODAL STYLES ---- */
        .redirect-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(5px);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 9999;
        }
        .redirect-modal.active { opacity: 1; visibility: visible; }
        .redirect-box {
            background: white; padding: 40px; border-radius: 16px; text-align: center;
            max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transform: translateY(20px); transition: all 0.3s ease;
        }
        .redirect-modal.active .redirect-box { transform: translateY(0); }
        .redirect-box h3 { color: var(--text-main); margin-top: 0; font-size: 1.5rem; }
        .redirect-box p { color: var(--text-muted); font-size: 1.1rem; }
        .progress-container {
            width: 100%; height: 12px; background: #e2e8f0; border-radius: 10px;
            margin: 25px 0; overflow: hidden; position: relative;
        }
        .progress-bar {
            height: 100%; width: 0%; background: var(--primary-color);
            border-radius: 10px; transition: width 1s linear;
        }
        .cancel-btn {
            background: #ef4444; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .cancel-btn:hover { background: #dc2626; }
    </style>
</head>
<body>

    <button class="menu-btn" id="menuBtn"><i class="fa-solid fa-bars"></i></button>
    <div class="overlay" id="overlay"></div>

    <nav class="sidebar" id="sidebar">
        <div class="menu-item" id="socialToggle">
            <span><i class="fa-solid fa-share-nodes" style="margin-right: 12px;"></i>Social Media</span>
            <i class="fa-solid fa-chevron-down" id="chevron" style="transition: transform 0.3s;"></i>
        </div>
        <div class="submenu" id="socialSubmenu">
            <a href="#"><i class="fa-brands fa-facebook"></i> Facebook</a>
            <a href="#"><i class="fa-brands fa-telegram"></i> Telegram</a>
            <a href="#"><i class="fa-brands fa-youtube"></i> YouTube</a>
            <a href="#"><i class="fa-brands fa-discord"></i> Discord</a>
        </div>
    </nav>

    <h1>My Blog</h1>
    <p class="subtitle">Latest updates and formatted posts</p>

    <div id="blog-container">
        <p style="text-align: center;">Loading posts...</p>
    </div>

    <div class="redirect-modal" id="redirectModal">
        <div class="redirect-box">
            <h3>Leaving so soon?</h3>
            <p>Opening link in <strong id="countdownText" style="color: var(--primary-color); font-size: 1.3rem;">10</strong> seconds...</p>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <button class="cancel-btn" id="cancelBtn">Cancel Redirect</button>
        </div>
    </div>

    <script>
        // UI Menu Logic
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const socialToggle = document.getElementById('socialToggle');
        const socialSubmenu = document.getElementById('socialSubmenu');
        const chevron = document.getElementById('chevron');

        function toggleMenu() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            if (sidebar.classList.contains('active')) {
                menuBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
            } else {
                menuBtn.innerHTML = '<i class="fa-solid fa-bars"></i>';
                socialSubmenu.classList.remove('active');
                chevron.style.transform = 'rotate(0deg)';
            }
        }
        menuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
        socialToggle.addEventListener('click', () => {
            socialSubmenu.classList.toggle('active');
            chevron.style.transform = socialSubmenu.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
        });

        // JSON Fetch & Markdown Logic
        async function loadPosts() {
            try {
                const response = await fetch('posts.json');
                const posts = await response.json();
                const container = document.getElementById('blog-container');
                container.innerHTML = ''; 

                posts.forEach(post => {
                    // Convert the Markdown text into beautiful HTML
                    const formattedContent = marked.parse(post.content);

                    const postCard = `
                        <div class="post-card">
                            <h2>${post.title}</h2>
                            <small><i class="fa-regular fa-calendar" style="margin-right: 5px;"></i> ${post.date}</small>
                            <div class="post-content">
                                ${formattedContent}
                            </div>
                        </div>
                    `;
                    container.innerHTML += postCard;
                });
            } catch (error) {
                document.getElementById('blog-container').innerHTML = '<p style="color: red; text-align: center;">Failed to load posts. Make sure posts.json exists!</p>';
                console.error('Error fetching posts:', error);
            }
        }

        loadPosts();

        // ---- NEW: 10 SECOND REDIRECT LOGIC ----
        const redirectModal = document.getElementById('redirectModal');
        const countdownText = document.getElementById('countdownText');
        const progressBar = document.getElementById('progressBar');
        const cancelBtn = document.getElementById('cancelBtn');
        
        let redirectTimer;
        let countdownInterval;

        // Listen for ANY click on the website
        document.body.addEventListener('click', function(e) {
            // Find if a link (<a> tag) was clicked
            const link = e.target.closest('a');
            
            // If it is a real link (not an empty "#" link for menus)
            if (link && link.getAttribute('href') && link.getAttribute('href') !== '#') {
                e.preventDefault(); // Stop them from leaving immediately
                
                const targetUrl = link.href;
                let timeLeft = 10;
                
                // Reset the modal visuals
                countdownText.innerText = timeLeft;
                progressBar.style.transition = 'none';
                progressBar.style.width = '0%';
                
                // Force a browser refresh to restart the CSS animation smoothly
                void progressBar.offsetWidth; 
                
                // Show modal and start animation
                redirectModal.classList.add('active');
                progressBar.style.transition = 'width 10s linear';
                progressBar.style.width = '100%';
                
                // Update the countdown number every 1 second
                countdownInterval = setInterval(() => {
                    timeLeft--;
                    countdownText.innerText = timeLeft;
                }, 1000);
                
                // Actually open the new tab after 10 seconds (10000ms)
                redirectTimer = setTimeout(() => {
                    clearInterval(countdownInterval);
                    redirectModal.classList.remove('active');
                    window.open(targetUrl, '_blank'); // Opens link in new tab
                }, 10000);
            }
        });

        // Cancel Button Logic
        cancelBtn.addEventListener('click', () => {
            clearTimeout(redirectTimer);
            clearInterval(countdownInterval);
            redirectModal.classList.remove('active');
        });
    </script>
</body>
</html>
